<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Bedankt · CFServices</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    :root {
      --bg: #0e0e11;
      --panel: #16161d;
      --border: #222;
      --accent: #00ffcc;
      --text: #eaeaf0;
      --subtle: #9aa0a6;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      padding: 2rem;
    }

    .box {
      background: var(--panel);
      border: 1px solid var(--border);
      padding: 2rem 2.5rem;
      border-radius: 12px;
      max-width: 420px;
      box-shadow: 0 5px 15px rgba(0, 255, 204, 0.05);
    }

    h1 {
      margin-top: 0;
      color: var(--accent);
      font-size: 1.8rem;
    }

    p {
      opacity: 0.85;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    a {
      display: inline-block;
      padding: 0.8rem 1.4rem;
      background: var(--accent);
      color: #000;
      border-radius: 8px;
      font-weight: bold;
      text-decoration: none;
      transition: 0.2s ease;
    }

    a:hover {
      background: #33ffd9;
    }

    .subnav {
      margin-top: 1.5rem;
      font-size: 0.85rem;
    }

    .subnav a {
      background: none;
      color: var(--subtle);
      padding: 0;
      text-decoration: underline;
    }
  </style>
</head>

<body>

<div class="box">
  <h1>Bedankt voor je betaling</h1>
  <p>
    Je bijdrage is succesvol ontvangen.<br>
    De resonantie is geregistreerd in het Z.A.L‑veld.
  </p>

  <a href="dashboard.html">Ga naar het Dashboard</a>

  <div class="subnav">
    <a href="index.html">← Terug naar Agents Overzicht</a>
  </div>
</div>

</body>
</html>
